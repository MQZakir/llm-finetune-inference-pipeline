# QLoRA fine-tuning recipe for 13B models (Llama-2-13B, etc.)
# Requires ~14 GB VRAM with 4-bit NF4 quantisation.
# Base model weights are frozen in 4-bit; only LoRA adapters are trained in BF16.

preset: qlora-13b

model:
  name_or_path: meta-llama/Llama-2-13b-hf
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

data:
  name_or_path: HuggingFaceH4/ultrachat_200k
  split: train_sft
  format: chat
  max_seq_length: 2048
  packing: true
  pad_to_multiple_of: 8
  max_samples: 50000
  system_prompt: "You are a helpful, harmless, and honest assistant."

training:
  output_dir: outputs/qlora_13b
  num_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16       # effective batch size = 16
  learning_rate: 1.5e-4
  lr_scheduler: cosine
  warmup_ratio: 0.05
  max_grad_norm: 0.3                    # lower clip for quantised training stability
  bf16: true
  fp16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  save_strategy: steps
  save_steps: 500
  logging_steps: 25
  report_to:
    - wandb
    - tensorboard
  early_stopping_patience: 5
