# Inference engine configuration for production deployment.

backend: llama-cpp               # llama-cpp | hf

# llama-cpp settings (GGUF backend)
llama_cpp:
  n_ctx: 4096                    # context window size
  n_gpu_layers: -1               # -1 = offload all layers to GPU; 0 = CPU only
  n_threads: null                # null = auto-detect CPU threads
  verbose: false

# HuggingFace backend settings
hf:
  torch_dtype: bfloat16
  device_map: auto
  load_in_4bit: false
  load_in_8bit: false
  attn_implementation: flash_attention_2

# Sampling defaults
sampling:
  temperature: 0.7
  top_p: 0.9
  top_k: 0                       # 0 = disabled
  min_p: 0.05
  repetition_penalty: 1.1
  max_tokens: 512
  stop_sequences: []

# Dynamic batching
batching:
  max_batch_size: 8
  max_waiting_tokens: 20         # max tokens to wait before flushing batch
  continuous_batching: false     # requires vLLM or TGI; not implemented here
