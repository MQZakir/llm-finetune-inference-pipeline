# Base configuration — shared defaults for all training runs.
# Task-specific configs override these values via OmegaConf merge.

seed: 42

model:
  name_or_path: null           # required in task config
  torch_dtype: bfloat16
  attn_implementation: null    # set to 'flash_attention_2' if available

data:
  name_or_path: null           # required in task config
  split: train
  format: chat                 # completion | instruct | chat
  max_seq_length: 2048
  packing: true
  pad_to_multiple_of: 8
  max_samples: null
  system_prompt: null
  min_length: 32

training:
  output_dir: null             # defaults to outputs/{config_name}
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 2
  save_strategy: steps
  save_steps: 250
  logging_steps: 10
  report_to:
    - none
  early_stopping_patience: null

inference:
  n_ctx: 4096
  n_gpu_layers: -1
  temperature: 0.7
  top_p: 0.9
  max_tokens: 512
