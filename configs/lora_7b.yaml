# LoRA fine-tuning recipe for 7–8B models (Llama-3-8B, Mistral-7B, etc.)
# Requires ~20 GB VRAM in BF16.
# No quantisation — full BF16 base model with LoRA adapters.

preset: lora-7b

model:
  name_or_path: meta-llama/Meta-Llama-3-8B
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2   # remove if flash-attn not installed

data:
  name_or_path: HuggingFaceH4/ultrachat_200k
  split: train_sft
  format: chat
  max_seq_length: 2048
  packing: true
  pad_to_multiple_of: 8
  max_samples: null
  system_prompt: "You are a helpful, harmless, and honest assistant."

training:
  output_dir: outputs/lora_7b
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8        # effective batch size = 16
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  save_strategy: steps
  save_steps: 250
  logging_steps: 10
  report_to:
    - wandb
    - tensorboard
  early_stopping_patience: null
